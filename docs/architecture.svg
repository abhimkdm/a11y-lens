<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1560" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#9AA7B4"/>
    </marker>
    <marker id="arb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8AC7FF"/>
    </marker>
  </defs>
  <rect width="1200" height="1560" fill="#0E1116"/>

  <!-- Title -->
  <text x="60" y="64" fill="#E9EEF5" font-size="30" font-weight="700">◎ A11y Lens v2 — System Architecture</text>
  <text x="60" y="92" fill="#9AA7B4" font-size="15">Tauri v2 desktop · React 19 UI · Node.js automation sidecar · local-first, phases 0–6, 8, 10–11, 13, 15</text>

  <!-- ======== DESKTOP SHELL ======== -->
  <rect x="60" y="120" width="1080" height="330" rx="14" fill="#161C24" stroke="#2b3340"/>
  <text x="84" y="152" fill="#8AC7FF" font-size="13" font-weight="700" letter-spacing="2">DESKTOP APP · TAURI v2 WINDOW</text>

  <!-- React UI -->
  <rect x="84" y="170" width="732" height="150" rx="10" fill="#0E1116" stroke="#3a4655"/>
  <text x="104" y="198" fill="#E9EEF5" font-size="16" font-weight="700">React 19 UI</text>
  <text x="104" y="218" fill="#9AA7B4" font-size="12">TypeScript · Vite · Material UI · Zustand store</text>
  <g font-size="13" fill="#C8D3DE">
    <rect x="104" y="234" width="160" height="64" rx="8" fill="#161C24" stroke="#2b3340"/>
    <text x="118" y="260" font-weight="600">Dashboard</text><text x="118" y="280" fill="#9AA7B4" font-size="11">score ring · history</text>
    <rect x="276" y="234" width="160" height="64" rx="8" fill="#161C24" stroke="#2b3340"/>
    <text x="290" y="260" font-weight="600">Scan Center</text><text x="290" y="280" fill="#9AA7B4" font-size="11">quick · full · keyboard</text>
    <rect x="448" y="234" width="160" height="64" rx="8" fill="#161C24" stroke="#2b3340"/>
    <text x="462" y="260" font-weight="600">Reports</text><text x="462" y="280" fill="#9AA7B4" font-size="11">sessions · compare</text>
    <rect x="620" y="234" width="176" height="64" rx="8" fill="#161C24" stroke="#2b3340"/>
    <text x="634" y="260" font-weight="600">Settings</text><text x="634" y="280" fill="#9AA7B4" font-size="11">AI · security · audit</text>
  </g>

  <!-- Tauri core -->
  <rect x="840" y="170" width="276" height="150" rx="10" fill="#0E1116" stroke="#3a4655"/>
  <text x="860" y="198" fill="#E9EEF5" font-size="16" font-weight="700">Tauri Core (Rust)</text>
  <text x="860" y="222" fill="#9AA7B4" font-size="12">window shell · spawns bundled</text>
  <text x="860" y="240" fill="#9AA7B4" font-size="12">sidecar binary in production</text>
  <text x="860" y="264" fill="#9AA7B4" font-size="12">bundle: MSI · NSIS · .app · .dmg</text>
  <text x="860" y="282" fill="#9AA7B4" font-size="12">(scripts/build-*.ps1)</text>

  <!-- exports out of UI -->
  <rect x="84" y="350" width="732" height="72" rx="10" fill="#0E1116" stroke="#3a4655"/>
  <text x="104" y="378" fill="#E9EEF5" font-size="14" font-weight="700">Client-side exports</text>
  <text x="104" y="400" fill="#9AA7B4" font-size="12">Interactive HTML report (filters · search · embedded AI report) · JSON · .a11ysession.json (portable session)</text>
  <line x1="450" y1="320" x2="450" y2="350" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- HTTP link UI -> sidecar -->
  <line x1="600" y1="450" x2="600" y2="510" stroke="#8AC7FF" stroke-width="2.5" marker-end="url(#arb)" marker-start="url(#arb)"/>
  <text x="614" y="486" fill="#8AC7FF" font-size="12" font-weight="600">HTTP · localhost:8787</text>

  <!-- ======== SIDECAR ======== -->
  <rect x="60" y="510" width="1080" height="640" rx="14" fill="#161C24" stroke="#2b3340"/>
  <text x="84" y="542" fill="#7BE8B0" font-size="13" font-weight="700" letter-spacing="2">NODE.JS SIDECAR · AUTOMATION &amp; INTELLIGENCE (express)</text>

  <!-- Row 1: engines -->
  <g font-size="13">
    <rect x="84" y="562" width="248" height="120" rx="10" fill="#0E1116" stroke="#3a4655"/>
    <text x="102" y="590" fill="#E9EEF5" font-weight="700" font-size="15">Playwright Engine</text>
    <text x="102" y="612" fill="#9AA7B4" font-size="12">headed Chromium/Chrome</text>
    <text x="102" y="630" fill="#9AA7B4" font-size="12">manual login · navigate</text>
    <text x="102" y="648" fill="#9AA7B4" font-size="12">screenshots · JS injection</text>

    <rect x="348" y="562" width="248" height="120" rx="10" fill="#0E1116" stroke="#3a4655"/>
    <text x="366" y="590" fill="#E9EEF5" font-weight="700" font-size="15">axe-core Engine</text>
    <text x="366" y="612" fill="#9AA7B4" font-size="12">WCAG 2.1 A/AA + best practice</text>
    <text x="366" y="630" fill="#9AA7B4" font-size="12">violations · severity · selector</text>
    <text x="366" y="648" fill="#9AA7B4" font-size="12">score = 100 − weighted penalty</text>

    <rect x="612" y="562" width="248" height="120" rx="10" fill="#0E1116" stroke="#3a4655"/>
    <text x="630" y="590" fill="#E9EEF5" font-weight="700" font-size="15">Overlay Engine</text>
    <text x="630" y="612" fill="#9AA7B4" font-size="12">severity dots + highlights</text>
    <text x="630" y="630" fill="#9AA7B4" font-size="12">tooltip: rule · WCAG · HTML</text>
    <text x="630" y="648" fill="#9AA7B4" font-size="12">suggested fix · copy actions</text>

    <rect x="876" y="562" width="240" height="120" rx="10" fill="#0E1116" stroke="#3a4655"/>
    <text x="894" y="590" fill="#E9EEF5" font-weight="700" font-size="15">Keyboard Engine</text>
    <text x="894" y="612" fill="#9AA7B4" font-size="12">hidden focusables</text>
    <text x="894" y="630" fill="#9AA7B4" font-size="12">positive tabindex</text>
    <text x="894" y="648" fill="#9AA7B4" font-size="12">missing focus indicators</text>
  </g>

  <!-- Row 2: crawler + AI -->
  <rect x="84" y="706" width="512" height="176" rx="10" fill="#0E1116" stroke="#7BE8B0" stroke-opacity="0.5"/>
  <text x="102" y="734" fill="#E9EEF5" font-weight="700" font-size="15">AI Autonomous Crawler (Phase 6)</text>
  <text x="102" y="758" fill="#C8D3DE" font-size="12">observe → safety filter → AI picks action → execute → scan → repeat</text>
  <rect x="102" y="772" width="476" height="52" rx="8" fill="#2a1518" stroke="#FF7B7B" stroke-opacity="0.6"/>
  <text x="118" y="794" fill="#FF7B7B" font-size="12" font-weight="700">HARD SAFETY RULES (AI cannot override)</text>
  <text x="118" y="812" fill="#E9B0B0" font-size="11.5">stay on origin · DENY: delete · submit · pay · approve · reject · logout · transfer …</text>
  <text x="102" y="852" fill="#9AA7B4" font-size="12">page budget (≤40) · dedupe visited · merged multi-page report · live log</text>

  <rect x="612" y="706" width="504" height="176" rx="10" fill="#0E1116" stroke="#3a4655"/>
  <text x="630" y="734" fill="#E9EEF5" font-weight="700" font-size="15">AI Layer (ai.mjs) + Report Generator (Phase 8)</text>
  <text x="630" y="758" fill="#9AA7B4" font-size="12">one chat() · JSON-safe parsing · exec summary · business impact</text>
  <text x="630" y="776" fill="#9AA7B4" font-size="12">quick wins · fixes in HTML / React / Angular</text>
  <g font-size="12" fill="#C8D3DE">
    <rect x="630" y="792" width="108" height="34" rx="17" fill="#161C24" stroke="#3a4655"/><text x="684" y="814" text-anchor="middle">OpenAI-compat</text>
    <rect x="746" y="792" width="88" height="34" rx="17" fill="#161C24" stroke="#3a4655"/><text x="790" y="814" text-anchor="middle">Claude</text>
    <rect x="842" y="792" width="88" height="34" rx="17" fill="#161C24" stroke="#3a4655"/><text x="886" y="814" text-anchor="middle">Gemini</text>
    <rect x="938" y="792" width="150" height="34" rx="17" fill="#12241c" stroke="#7BE8B0"/><text x="1013" y="814" text-anchor="middle" fill="#7BE8B0">Ollama (local)</text>
  </g>
  <text x="630" y="852" fill="#9AA7B4" font-size="12">heuristic fallback when no AI configured or call fails</text>

  <!-- Row 3: security + data -->
  <rect x="84" y="906" width="512" height="216" rx="10" fill="#0E1116" stroke="#8AC7FF" stroke-opacity="0.5"/>
  <text x="102" y="934" fill="#E9EEF5" font-weight="700" font-size="15">Security Layer (Phase 15)</text>
  <text x="102" y="960" fill="#C8D3DE" font-size="12.5">🔐 API-key vault — AES-256-GCM at rest, key never returned to UI</text>
  <text x="102" y="984" fill="#C8D3DE" font-size="12.5">🏠 Local-only mode — blocks cloud providers, Ollama only</text>
  <text x="102" y="1008" fill="#C8D3DE" font-size="12.5">🎭 Masking — emails · cards · SSNs · tokens · password values</text>
  <text x="102" y="1032" fill="#C8D3DE" font-size="12.5">📜 Append-only audit log — scans · sessions · settings · AI calls</text>
  <text x="102" y="1060" fill="#9AA7B4" font-size="11.5">gates every AI call (resolveAi) and every session write</text>
  <text x="102" y="1100" fill="#9AA7B4" font-size="11.5">keyfile 0600 → upgradeable to OS keychain in packaged build</text>

  <rect x="612" y="906" width="504" height="216" rx="10" fill="#0E1116" stroke="#3a4655"/>
  <text x="630" y="934" fill="#E9EEF5" font-weight="700" font-size="15">Session Store &amp; Comparison (Phases 10 · 13)</text>
  <text x="630" y="960" fill="#C8D3DE" font-size="12.5">🗄 SQLite — ~/.a11y-lens/sessions.db</text>
  <text x="630" y="984" fill="#9AA7B4" font-size="12">sessions · settings (encrypted AI cfg) · audit tables</text>
  <text x="630" y="1010" fill="#C8D3DE" font-size="12.5">every scan auto-saved · import/export round-trip</text>
  <text x="630" y="1040" fill="#C8D3DE" font-size="12.5">⇄ compare(prev, curr): element-level diff (rule + selector)</text>
  <text x="654" y="1064" fill="#7BE8B0" font-size="12">fixed</text>
  <text x="704" y="1064" fill="#FFB35C" font-size="12">new</text>
  <text x="744" y="1064" fill="#FF7B7B" font-size="12">regressions</text>
  <text x="836" y="1064" fill="#9AA7B4" font-size="12">· score delta</text>

  <!-- internal arrows -->
  <line x1="208" y1="682" x2="208" y2="706" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="472" y1="682" x2="472" y2="706" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="596" y1="794" x2="612" y2="794" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="340" y1="882" x2="340" y2="906" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="864" y1="882" x2="864" y2="906" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="596" y1="1014" x2="612" y2="1014" stroke="#8AC7FF" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- ======== EXTERNAL ======== -->
  <line x1="208" y1="1150" x2="208" y2="1210" stroke="#9AA7B4" stroke-width="2" marker-end="url(#ar)" marker-start="url(#ar)"/>
  <rect x="60" y="1210" width="512" height="130" rx="14" fill="#161C24" stroke="#2b3340"/>
  <text x="84" y="1242" fill="#FFB35C" font-size="13" font-weight="700" letter-spacing="2">TARGET · ENTERPRISE WEB APP</text>
  <text x="84" y="1272" fill="#C8D3DE" font-size="13">Visible Chrome window — QA logs in manually,</text>
  <text x="84" y="1294" fill="#C8D3DE" font-size="13">credentials never touch A11y Lens.</text>
  <text x="84" y="1320" fill="#9AA7B4" font-size="12">axe injected per page · overlay drawn in-page · crawler navigates read-only</text>

  <line x1="960" y1="1150" x2="960" y2="1210" stroke="#9AA7B4" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ar)"/>
  <rect x="628" y="1210" width="512" height="130" rx="14" fill="#161C24" stroke="#2b3340" stroke-dasharray="6 5"/>
  <text x="652" y="1242" fill="#9AA7B4" font-size="13" font-weight="700" letter-spacing="2">CLOUD AI (OPTIONAL · OFF IN LOCAL-ONLY MODE)</text>
  <text x="652" y="1272" fill="#C8D3DE" font-size="13">api.openai.com · api.anthropic.com · generativelanguage.googleapis.com</text>
  <text x="652" y="1298" fill="#9AA7B4" font-size="12">only masked, minimal scan facts sent — never screenshots or credentials</text>
  <text x="652" y="1320" fill="#7BE8B0" font-size="12">Ollama alternative keeps everything on-machine</text>

  <!-- ======== FLOW STRIP ======== -->
  <rect x="60" y="1380" width="1080" height="120" rx="14" fill="#10151C" stroke="#2b3340"/>
  <text x="84" y="1412" fill="#8AC7FF" font-size="13" font-weight="700" letter-spacing="2">QA WORKFLOW</text>
  <g font-size="13" fill="#E9EEF5">
    <rect x="84" y="1428" width="150" height="44" rx="22" fill="#161C24" stroke="#3a4655"/><text x="159" y="1455" text-anchor="middle">1 · Open app</text>
    <line x1="234" y1="1450" x2="262" y2="1450" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="264" y="1428" width="150" height="44" rx="22" fill="#161C24" stroke="#3a4655"/><text x="339" y="1455" text-anchor="middle">2 · Log in</text>
    <line x1="414" y1="1450" x2="442" y2="1450" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="444" y="1428" width="190" height="44" rx="22" fill="#12241c" stroke="#7BE8B0"/><text x="539" y="1455" text-anchor="middle" fill="#7BE8B0">3 · Full Scan</text>
    <line x1="634" y1="1450" x2="662" y2="1450" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="664" y="1428" width="220" height="44" rx="22" fill="#161C24" stroke="#3a4655"/><text x="774" y="1455" text-anchor="middle">4 · AI report + fixes</text>
    <line x1="884" y1="1450" x2="912" y2="1450" stroke="#9AA7B4" stroke-width="1.5" marker-end="url(#ar)"/>
    <rect x="914" y="1428" width="202" height="44" rx="22" fill="#161C24" stroke="#3a4655"/><text x="1015" y="1455" text-anchor="middle">5 · Compare over time</text>
  </g>
</svg>
